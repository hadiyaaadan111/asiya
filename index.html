<!DOCTYPE html>
<html>
<head>
<title>Samsung Calculator</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.calculator{
    width:340px;
}
#display{
    width:100%;
    height:100px;
    background:black;
    color:white;
    border:none;
    font-size:40px;
    text-align:right;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}
button{
    height:70px;
    border:none;
    border-radius:50%;
    font-size:24px;
    cursor:pointer;
}

.number{
    background:#333;
    color:white;
}

.operator{
    background:orange;
    color:white;
}
.clear{
    background:#a5a5a5;
    color:black;
}
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
<button class="clear" onclick="appendValue('%')">%</button>
<button class="clear" onclick="appendValue('/')">÷</button>
<button class="operator" onclick="appendValue('*')">×</button>

<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button class="number" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('-')">−</button>

<button class="number" onclick="appendValue('4')">4</button>
<button class="number" onclick="appendValue('5')">5</button>
<button class="number" onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button class="number" onclick="appendValue('1')">1</button>
<button class="number" onclick="appendValue('2')">2</button>
<button class="number" onclick="appendValue('3')">3</button>
<button class="operator" onclick="calculate()">=</button>
<button class="number" onclick="appendValue('0')">0</button>
<button class="number" onclick="appendValue('.')">.</button>

</div>
</div>

<script>
let display = document.getElementById("display");
function appendValue(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}
function calculate(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value = "Error";
    }
}
</script>

</body>
</html>
